# kubectl -n octy-development rollout restart deployment configurations-deploy [update all pods after code changes]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: configurations-deploy
  namespace: octy-production
  labels:
    app: configurations-app
spec:
  selector:
    matchLabels:
      app: configurations-app
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: configurations-app
    spec:
      containers:
      - name: configurations-app
        image: benpayflic/octy-configurations-service:latest
        imagePullPolicy: Always
        env:
          - name: CONFIGURATIONS_CONFIG # name that can be refefenced in app
            valueFrom:
              configMapKeyRef:
                name: configurations-config  # The ConfigMap this value comes from.
                key: configurations_config # The key to fetch.
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
      imagePullSecrets:
      - name: docker-hub-key

