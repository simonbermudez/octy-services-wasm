apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-deploy
  namespace: octy-production
  labels:
    app: admin-app
spec:
  selector:
    matchLabels:
      app: admin-app
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: admin-app
    spec:
      containers:
      - name: admin-app
        image: benpayflic/octy-admin-service:$COMMIT_SHA1
        imagePullPolicy: Always
        env:
          - name: ADMIN_CONFIG # name that can be refefenced in app
            valueFrom:
              configMapKeyRef:
                name: admin-config  # The ConfigMap this value comes from.
                key: admin_config # The key to fetch.
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
      imagePullSecrets:
      - name: docker-hub-key