---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: churn-prediction-worker-deploy
  namespace: octy-development
  labels:
    app: churn-prediction-worker-app
spec:
  selector:
    matchLabels:
      app: churn-prediction-worker-app
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: churn-prediction-worker-app
    spec:
      containers:
      - name: churn-prediction-worker-app
        image: octysonity/octy-churn-prediction-worker:latest
        imagePullPolicy: Always
        env:
          - name: CHURN_PREDICTION_WORKER_CONFIG # name that can be refefenced in app
            valueFrom:
              configMapKeyRef:
                name: churn-prediction-worker-config  # The ConfigMap this value comes from.
                key: churn_prediction_worker_config # The key to fetch.
          - name: CHURN_PREDICTION_WORKER_SECRETS # name that can be refefenced in app
            valueFrom:
              secretKeyRef:
                name: churn-prediction-worker-secrets # The Secret this value comes from.
                key: churn_prediction_worker_secrets # The key to fetch.
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
      imagePullSecrets:
      - name: docker-hub-key