# ForwardAuth Middleware
# Forward authentication to https://sandbox.api.octy.ai/v1/account/authenticate
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: forward-auth
  namespace: octy-development
spec:
  forwardAuth:
    address: https://sandbox.api.octy.ai/v1/account/authenticate
    trustForwardHeader: true
    authResponseHeaders:
      - X-AUTH-JWT-TOKEN

---
# ADMIN AUTH MIDDLEWARE
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: admin-auth
  namespace: octy-development
spec:
  basicAuth:
    secret: admin-authsecret

---
# Note: in a kubernetes secret the string (e.g. generated by htpasswd) must be base64-encoded first.
# To create an encoded user:password pair, the following command can be used:
# htpasswd -nb admin_pk admin_pk | openssl base64

apiVersion: v1
kind: Secret
metadata:
  name: admin-authsecret
  namespace: octy-development

data:
  users: |2
    YWRtaW5fcGtfYm5tbXhLY0N3VTJ3TTBUMVJXS1F6US1BNUQwMTU2NDBBRkM0Q0U1N0UzQjokYXByMSRsVkdtRTJSViRRZ29xNlNoeWdOc1MycU5lbGhCenUxCgo=
---
# TRUSTED APP AUTH MIDDLEWARE
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: trusted-app-auth
  namespace: octy-development
spec:
  basicAuth:
    secret: trusted-app-authsecret

---
# Note: in a kubernetes secret the string (e.g. generated by htpasswd) must be base64-encoded first.
# To create an encoded user:password pair, the following command can be used:
# htpasswd -nb client_id client_secret | openssl base64

apiVersion: v1
kind: Secret
metadata:
  name: trusted-app-authsecret
  namespace: octy-development

data:
  users: |2
    ZDhFNkYyNUQxLTExMzctNEFFRS04REYzLTAwNzZCNEI1QzlBRDUwRTNERkE0LUY0RUUtNDgzOS1BOEMxLUE1RDAxNTY0MEFGQzRDRTU3RTNCLTYwNzctNDZFQS05QTgyLTkyNUYyODlEODk1QTokYXByMSRrSWtKRDM0ZCRhRmk0T1AudnlJNVJzdWl1LzhIUTUxCgo=
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: https-only
  namespace: octy-development
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: octy-development-ingress-https
  namespace: octy-development
spec:
  entryPoints:
    - websecure
  routes:
  # TODO: remove in production
  ##### INTERNAL ROUTES ######
    - match: Path(`/v1/internal/items`)
      kind: Rule
      services:
        - name: items-service
          port: 1028
    - match: Path(`/v1/internal/accounts`)
      kind: Rule
      services:
        - name: account-service
          port: 1024
    - match: Path(`/v1/internal/profiles`)
      kind: Rule
      services:
        - name: profiles-service
          port: 1027

    - match: Path(`/v1/internal/events`)
      kind: Rule
      services:
        - name: events-service
          port: 1029

    - match: Path(`/v1/internal/events/types`)
      kind: Rule
      services:
        - name: events-service
          port: 1029
    
    - match: Path(`/v1/internal/segments`)
      kind: Rule
      services:
        - name: segmentation-service
          port: 1030

    - match: Path(`/v1/internal/recommendations`)
      kind: Rule
      services:
        - name: recommendations-service
          port: 1032
        
  ############################
    - match: Path(`/v1/admin/account/create`)
      middlewares:
        - name: admin-auth
      kind: Rule
      services:
        - name: account-service
          port: 1024
    - match: Path(`/v1/account/authenticate`)
      kind: Rule
      services:
        - name: account-service
          port: 1024
    - match: Path(`/v1/admin/application/resources/format`)
      middlewares:
        - name: trusted-app-auth
      kind: Rule
      services:
        - name: admin-service
          port: 1025
    - match: Path(`/v1/admin/application/versioning`)
      middlewares:
        - name: trusted-app-auth
      kind: Rule
      services:
        - name: admin-service
          port: 1025
    - match: PathPrefix(`/v1/configurations/`)
      middlewares:
        - name : forward-auth
      kind: Rule
      services:
        - name: configurations-service
          port: 1026
    - match: PathPrefix(`/v1/retention/profiles`)
      middlewares:
        - name : forward-auth
      kind: Rule
      services:
        - name: profiles-service
          port: 1027
    - match: PathPrefix(`/v1/retention/items`)
      middlewares:
        - name : forward-auth
      kind: Rule
      services:
        - name: items-service
          port: 1028
    - match: PathPrefix(`/v1/retention/events`)
      middlewares:
        - name : forward-auth
      kind: Rule
      services:
        - name: events-service
          port: 1029
    - match: PathPrefix(`/v1/retention/segments`)
      middlewares:
        - name : forward-auth
      kind: Rule
      services:
        - name: segmentation-service
          port: 1030
  tls:
    secretName: octy-production-cert


---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
