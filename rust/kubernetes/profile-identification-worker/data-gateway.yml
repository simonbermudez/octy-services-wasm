# octy-data-gateway — native sidecar deployment bridging the WASM component
# to MongoDB / RabbitMQ. Only the env below (queue bindings, forward URL) is
# profile-identification-worker-specific; this worker has no S3 usage, so no
# AWS_* credentials are configured (the gateway's S3 bridge stays disabled).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-identification-worker-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-identification-worker-gateway
  template:
    metadata:
      labels:
        app: profile-identification-worker-gateway
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: profile-identification-worker-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: profile-identification-worker-secrets
                  key: AMQP_URL
            # Matches config.json `EXCHANGE` ("octy-services").
            - name: AMQP_EXCHANGE
              value: "octy-services"
            - name: AMQP_QUEUE_PREFIX
              value: "profile-identification-worker"
            # Routing key consumed by amqp/consumer.py
            # (profile.identification.cmd.run) — the queue is declared/bound
            # by the gateway as `{AMQP_QUEUE_PREFIX}.{routing_key}`.
            - name: AMQP_CONSUMERS
              value: '["profile.identification.cmd.run"]'
            - name: AMQP_FORWARD_URL
              value: "http://profile-identification-worker-service/internal/amqp/consume"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: profile-identification-worker-gateway
spec:
  selector:
    app: profile-identification-worker-gateway
  ports:
    - port: 8090
      targetPort: 8090
