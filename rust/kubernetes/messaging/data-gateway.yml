# octy-data-gateway — native sidecar deployment bridging the messaging WASM
# component to MongoDB. One deployment per service; this instance only needs
# Mongo (`tbl_templates`, `tbl_currency_rates`) — the Python messaging service
# used no RabbitMQ and no S3, so AMQP_URL / AWS_* are intentionally omitted
# (AMQP publish/consume and S3 stay disabled in the gateway, see
# gateway/octy-data-gateway/src/main.rs and s3.rs).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-data-gateway-messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-data-gateway-messaging
  template:
    metadata:
      labels:
        app: octy-data-gateway-messaging
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            # DB_URI must include the default database that hosts
            # tbl_templates / tbl_currency_rates (the Python service's
            # `template_db` / `currency_rates_db` mongoengine aliases both
            # pointed at the same connection string in every observed
            # deployment).
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: messaging-secrets
                  key: DB_URI
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-data-gateway-messaging
spec:
  selector:
    app: octy-data-gateway-messaging
  ports:
    - port: 8090
      targetPort: 8090
