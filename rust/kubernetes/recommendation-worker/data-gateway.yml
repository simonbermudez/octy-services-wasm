# octy-data-gateway — native sidecar deployment bridging the WASM component
# to MongoDB / RabbitMQ / S3. One deployment per service; only the env below
# (queue bindings, forward URL, AWS creds) is recommendation-worker-specific.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-worker-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-worker-gateway
  template:
    metadata:
      labels:
        app: recommendation-worker-gateway
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: recommendation-worker-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: recommendation-worker-secrets
                  key: AMQP_URL
            # Matches config.json `EXCHANGE` ("octy-services").
            - name: AMQP_EXCHANGE
              value: "octy-services"
            - name: AMQP_QUEUE_PREFIX
              value: "recommendation-worker"
            # Routing keys consumed by amqp/consumer.py (rec.training.cmd.run,
            # rec.training.complete.cmd.run) — queues are declared/bound by
            # the gateway as `{AMQP_QUEUE_PREFIX}.{routing_key}`.
            - name: AMQP_CONSUMERS
              value: '["rec.training.cmd.run","rec.training.complete.cmd.run"]'
            - name: AMQP_FORWARD_URL
              value: "http://recommendation-worker-service/internal/amqp/consume"
            # Used for both the gateway's S3 bridge (bucket_repository.py)
            # and must match the region the component signs SageMaker calls
            # for (AWS_REGION in recommendation_worker_config).
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: recommendation-worker-secrets
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: recommendation-worker-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: recommendation-worker-secrets
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-worker-gateway
spec:
  selector:
    app: recommendation-worker-gateway
  ports:
    - port: 8090
      targetPort: 8090
