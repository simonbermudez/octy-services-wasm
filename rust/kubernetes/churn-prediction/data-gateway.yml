# octy-data-gateway — native sidecar deployment bridging the WASM component
# to MongoDB. One deployment per service; the churn-prediction service has no
# AMQP consumers/publishers and no S3 usage, so the AMQP_* / AWS_* env vars
# are omitted (the gateway disables AMQP when AMQP_URL is unset).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-data-gateway-churn-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-data-gateway-churn-prediction
  template:
    metadata:
      labels:
        app: octy-data-gateway-churn-prediction
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            # Same Mongo connection string the Python service read from
            # Secrets['DB_URI'] (must include the default database in path).
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: churn-prediction-secrets
                  key: DB_URI
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-data-gateway-churn-prediction
spec:
  selector:
    app: octy-data-gateway-churn-prediction
  ports:
    - port: 8090
      targetPort: 8090
