# octy-data-gateway — native sidecar deployment bridging the events WASM
# component to MongoDB / RabbitMQ. One deployment per service (queue
# bindings and forward URL are service-specific); this service does not use
# the S3 bridge, so AWS credentials are omitted (S3 stays disabled in the
# gateway when unset).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-data-gateway-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-data-gateway-events
  template:
    metadata:
      labels:
        app: octy-data-gateway-events
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: events-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: events-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy"
            - name: AMQP_QUEUE_PREFIX
              value: "events"
            # Port of `amqp/consumer.py::handle_message` routing keys.
            - name: AMQP_CONSUMERS
              value: '["events.cmd.delete","events.cmd.update"]'
            - name: AMQP_FORWARD_URL
              value: "http://events-service/internal/amqp/consume"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-data-gateway-events
spec:
  selector:
    app: octy-data-gateway-events
  ports:
    - port: 8090
      targetPort: 8090
