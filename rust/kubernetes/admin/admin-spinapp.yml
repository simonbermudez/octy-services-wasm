# Admin service as a WASM container on Kubernetes via SpinKube
# (https://www.spinkube.dev). Requires the spin-operator + a containerd shim
# (runtime class wasmtime-spin-v2) installed on the cluster.
#
# Build & push the app (from rust/services/admin):
#   spin build
#   spin registry push <registry>/octy-admin:0.1.0
#
# NOTE: unlike the other services, admin has NO octy-data-gateway deployment.
# The service is Redis-only (release-version cache in Redis db 0, reached
# directly via Spin's outbound-Redis support) — it uses no MongoDB, AMQP or
# S3, so there is nothing for a gateway sidecar to bridge.
apiVersion: core.spinkube.dev/v1alpha1
kind: SpinApp
metadata:
  name: octy-admin
spec:
  image: "<registry>/octy-admin:0.1.0"
  executor: containerd-shim-spin
  replicas: 2
  variables:
    # admin_config / admin_secrets are the same base64-encoded blobs the
    # Python deployment consumed (configMap admin-config key admin_config,
    # secret admin-secrets key admin_secrets).
    - name: admin_config
      valueFrom:
        configMapKeyRef:
          name: admin-config
          key: admin_config
    - name: admin_secrets
      valueFrom:
        secretKeyRef:
          name: admin-secrets
          key: admin_secrets
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
spec:
  selector:
    core.spinkube.dev/app-name: octy-admin
  ports:
    - port: 80
      targetPort: 80
