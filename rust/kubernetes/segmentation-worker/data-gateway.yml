# octy-data-gateway — native sidecar bridging the segmentation_worker WASM
# component to MongoDB (tbl_segments) and RabbitMQ. One deployment per
# service (queue bindings and forward URL are service-specific); this is the
# same generic gateway image used by every other service/worker, per
# rust/README.md.
#
# segmentation_worker does not use S3 (verified: no BucketRepository /
# joblib-artifact usage in workers/segmentation/), so AWS_* env vars are
# intentionally omitted — the gateway's S3 client degrades to "disabled"
# without them (see gateway/octy-data-gateway/src/s3.rs::from_env).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: segmentation-worker-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: segmentation-worker-gateway
  template:
    metadata:
      labels:
        app: segmentation-worker-gateway
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: segmentation-worker-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: segmentation-worker-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy-services"
            - name: AMQP_QUEUE_PREFIX
              value: "segmentation-worker"
            # Routing keys consumed by workers/segmentation/amqp/consumer.py
            # (config.json AMQP_CONSUMERS), forwarded here as
            # POST /internal/amqp/consume.
            - name: AMQP_CONSUMERS
              value: '["past.segmentation.cmd.run","live.segmentation.cmd.run"]'
            - name: AMQP_FORWARD_URL
              value: "http://segmentation-worker-service/internal/amqp/consume"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: segmentation-worker-gateway
spec:
  selector:
    app: segmentation-worker-gateway
  ports:
    - port: 8090
      targetPort: 8090
