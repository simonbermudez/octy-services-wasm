# octy-data-gateway — native sidecar deployment bridging the recommendation
# WASM component to MongoDB / RabbitMQ. One deployment per service (queue
# bindings and forward URL are service-specific); the image is the same
# generic gateway used by every service — only the env differs.
#
# The recommendation service consumes a single routing key:
#   reccache.cmd.delete  (published by the profile-identification worker)
# Deliveries are forwarded to the component as POST /internal/amqp/consume
# (2xx → ack, 4xx → reject no-requeue, 5xx → reject + requeue).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-data-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-data-gateway
  template:
    metadata:
      labels:
        app: recommendation-data-gateway
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: recommendation-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: recommendation-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy-services"
            - name: AMQP_QUEUE_PREFIX
              value: "recommendation"
            - name: AMQP_CONSUMERS
              value: '["reccache.cmd.delete"]'
            - name: AMQP_FORWARD_URL
              value: "http://recommendation-service/internal/amqp/consume"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-data-gateway
spec:
  selector:
    app: recommendation-data-gateway
  ports:
    - port: 8090
      targetPort: 8090
