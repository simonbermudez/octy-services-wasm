# octy-data-gateway — native sidecar deployment bridging the segmentation
# WASM component to MongoDB / RabbitMQ. One deployment per service (queue
# bindings and forward URL are service-specific); the gateway image itself is
# generic — only its env differs. Segmentation does not touch S3, so the
# AWS_* env vars are omitted (S3 operations stay disabled in this instance).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-data-gateway-segmentation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-data-gateway-segmentation
  template:
    metadata:
      labels:
        app: octy-data-gateway-segmentation
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: segmentation-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: segmentation-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy-services"
            - name: AMQP_QUEUE_PREFIX
              value: "segmentation"
            # Routing key consumed by amqp/consumer.py -> POST /internal/amqp/consume.
            - name: AMQP_CONSUMERS
              value: '["segment.profiles.cmd.update"]'
            - name: AMQP_FORWARD_URL
              value: "http://segmentation-service/internal/amqp/consume"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-data-gateway-segmentation
spec:
  selector:
    app: octy-data-gateway-segmentation
  ports:
    - port: 8090
      targetPort: 8090
