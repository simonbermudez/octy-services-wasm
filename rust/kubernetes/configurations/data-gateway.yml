# octy-data-gateway — native sidecar deployment bridging the WASM component
# to RabbitMQ. One deployment per service; the configurations service only
# PUBLISHES (account.configs.cmd.update / algo.configs.cmd.update) and has no
# AMQP consumers, so no AMQP_CONSUMERS / AMQP_FORWARD_URL / AMQP_QUEUE_PREFIX
# env is set. It performs no Mongo or S3 calls either, but the gateway still
# requires DB_URI at startup (reuses the generic gateway image).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-configurations-data-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-configurations-data-gateway
  template:
    metadata:
      labels:
        app: octy-configurations-data-gateway
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: configurations-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: configurations-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-configurations-data-gateway
spec:
  selector:
    app: octy-configurations-data-gateway
  ports:
    - port: 8090
      targetPort: 8090
