# octy-data-gateway — native sidecar deployment bridging the WASM components
# to MongoDB / RabbitMQ / S3. One deployment per service (queue bindings and
# forward URL are service-specific).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-data-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-data-gateway
  template:
    metadata:
      labels:
        app: octy-data-gateway
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: account-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: account-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy-services"
            - name: AMQP_QUEUE_PREFIX
              value: "account"
            - name: AMQP_CONSUMERS
              value: '["account.configs.cmd.update","algo.configs.cmd.update","churn.info.cmd.update"]'
            - name: AMQP_FORWARD_URL
              value: "http://account-service/internal/amqp/consume"
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: account-secrets
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: account-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: account-secrets
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-data-gateway
spec:
  selector:
    app: octy-data-gateway
  ports:
    - port: 8090
      targetPort: 8090
