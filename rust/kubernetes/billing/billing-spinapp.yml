# Billing service as a WASM container on Kubernetes via SpinKube
# (https://www.spinkube.dev). Requires the spin-operator + a containerd shim
# (runtime class wasmtime-spin-v2) installed on the cluster, e.g.:
#   kubectl apply -f https://github.com/spinframework/spin-operator/releases/latest/download/spin-operator.runtime-class.yaml
#
# Build & push the app (from rust/services/billing):
#   spin build
#   spin registry push <registry>/octy-billing:0.1.0
apiVersion: core.spinkube.dev/v1alpha1
kind: SpinApp
metadata:
  name: octy-billing
spec:
  image: "<registry>/octy-billing:0.1.0"
  executor: containerd-shim-spin
  replicas: 2
  variables:
    - name: gateway_url
      value: "http://octy-data-gateway-billing:8090"
    # billing_config / billing_secrets are the same base64-encoded blobs the
    # Python deployment consumed via BILLING_CONFIG / BILLING_SECRETS.
    - name: billing_config
      valueFrom:
        configMapKeyRef:
          name: billing-config
          key: billing_config
    - name: billing_secrets
      valueFrom:
        secretKeyRef:
          name: billing-secrets
          key: billing_secrets
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
spec:
  selector:
    core.spinkube.dev/app-name: octy-billing
  ports:
    - port: 80
      targetPort: 80
