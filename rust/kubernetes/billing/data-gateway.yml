# octy-data-gateway (billing) — native sidecar deployment bridging the WASM
# component to MongoDB / RabbitMQ. One deployment per service (queue bindings
# and forward URL are service-specific); reuses the generic gateway image.
#
# Billing consumes one routing key (Python AMQP_CONSUMERS config:
# queue "capture-billing-units-queue", key "account.billing.cmd.capture")
# on the "octy-services" exchange, forwarded to the component's
# /internal/amqp/consume route. Billing does not use S3, so no AWS env.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-data-gateway-billing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-data-gateway-billing
  template:
    metadata:
      labels:
        app: octy-data-gateway-billing
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: billing-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy-services"
            - name: AMQP_QUEUE_PREFIX
              value: "billing"
            - name: AMQP_CONSUMERS
              value: '["account.billing.cmd.capture"]'
            - name: AMQP_FORWARD_URL
              value: "http://billing-service/internal/amqp/consume"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-data-gateway-billing
spec:
  selector:
    app: octy-data-gateway-billing
  ports:
    - port: 8090
      targetPort: 8090
