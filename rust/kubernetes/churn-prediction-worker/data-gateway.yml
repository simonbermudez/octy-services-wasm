# octy-data-gateway — native sidecar deployment bridging the
# churn-prediction-worker WASM component to MongoDB / RabbitMQ / S3.
# SigV4-signed SageMaker calls (control plane + runtime) are made directly by
# the component itself (`octy_spin::aws::send_signed`), not through this
# gateway.
#
# Routing keys mirror `workers/churn_prediction/amqp/consumer.py` /
# `workers/churn_prediction/config.json`'s `AMQP_CONSUMERS`:
#   churn-training-run-queue      -> churn.training.cmd.run
#   churn-training-complete-queue -> churn.training.complete.cmd.run
#
# Published routing keys (via `ctx.gateway.amqp_publish`, no consumer
# binding needed here): octy.job.cmd.create, octy.job.cmd.delete,
# profiles.cmd.update, churn.info.cmd.update, account.billing.cmd.capture.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-data-gateway-churn-prediction-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-data-gateway-churn-prediction-worker
  template:
    metadata:
      labels:
        app: octy-data-gateway-churn-prediction-worker
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: churn-prediction-worker-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: churn-prediction-worker-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy-services"
            - name: AMQP_QUEUE_PREFIX
              value: "churn-prediction-worker"
            - name: AMQP_CONSUMERS
              value: '["churn.training.cmd.run","churn.training.complete.cmd.run"]'
            - name: AMQP_FORWARD_URL
              value: "http://churn-prediction-worker-service/internal/amqp/consume"
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: churn-prediction-worker-secrets
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: churn-prediction-worker-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: churn-prediction-worker-secrets
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-data-gateway-churn-prediction-worker
spec:
  selector:
    app: octy-data-gateway-churn-prediction-worker
  ports:
    - port: 8090
      targetPort: 8090
