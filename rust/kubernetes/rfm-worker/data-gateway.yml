# octy-data-gateway — native sidecar deployment bridging the rfm-worker WASM
# component to MongoDB / RabbitMQ / S3 / (SigV4-signed SageMaker calls are
# made directly by the component itself, not through this gateway).
#
# Routing keys mirror `workers/rfm/amqp/consumer.py` /
# `workers/rfm/config.json`'s `AMQP_CONSUMERS`:
#   rfm-training-run-queue      -> rfm.training.cmd.run
#   rfm-training-complete-queue -> rfm.training.complete.cmd.run
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-data-gateway-rfm-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-data-gateway-rfm-worker
  template:
    metadata:
      labels:
        app: octy-data-gateway-rfm-worker
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: rfm-worker-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: rfm-worker-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy-services"
            - name: AMQP_QUEUE_PREFIX
              value: "rfm-worker"
            - name: AMQP_CONSUMERS
              value: '["rfm.training.cmd.run","rfm.training.complete.cmd.run"]'
            - name: AMQP_FORWARD_URL
              value: "http://rfm-worker-service/internal/amqp/consume"
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: rfm-worker-secrets
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rfm-worker-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rfm-worker-secrets
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-data-gateway-rfm-worker
spec:
  selector:
    app: octy-data-gateway-rfm-worker
  ports:
    - port: 8090
      targetPort: 8090
