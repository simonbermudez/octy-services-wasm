# Items service as a WASM container on Kubernetes via SpinKube
# (https://www.spinkube.dev). Requires the spin-operator + a containerd shim
# (runtime class wasmtime-spin-v2) installed on the cluster, e.g.:
#   kubectl apply -f https://github.com/spinframework/spin-operator/releases/latest/download/spin-operator.runtime-class.yaml
#
# Build & push the app (from rust/services/items):
#   spin build
#   spin registry push <registry>/octy-items:0.1.0
apiVersion: core.spinkube.dev/v1alpha1
kind: SpinApp
metadata:
  name: octy-items
spec:
  image: "<registry>/octy-items:0.1.0"
  executor: containerd-shim-spin
  replicas: 2
  variables:
    - name: gateway_url
      value: "http://octy-items-data-gateway:8090"
    # items_config / items_secrets come from the same base64-encoded blobs
    # the Python deployment used (ITEMS_CONFIG / ITEMS_SECRETS).
    - name: items_config
      valueFrom:
        configMapKeyRef:
          name: items-config
          key: ITEMS_CONFIG
    - name: items_secrets
      valueFrom:
        secretKeyRef:
          name: items-secrets
          key: ITEMS_SECRETS
    # RS256 public key used to verify the X-AUTH-JWT fat token minted by the
    # account service. Falls back to the packaged keys/octy-public-key.pub
    # file if unset.
    - name: octy_public_key
      valueFrom:
        secretKeyRef:
          name: items-secrets
          key: OCTY_PUBLIC_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: items-service
spec:
  selector:
    core.spinkube.dev/app-name: octy-items
  ports:
    - port: 80
      targetPort: 80
