# octy-data-gateway — native sidecar deployment bridging the items WASM
# component to MongoDB / RabbitMQ. One deployment per service; this instance
# is named uniquely (octy-items-data-gateway) so it does not collide with
# other services' gateway deployments in the same namespace.
#
# The items service has no AMQP *consumers* (it never registered an
# `/internal/amqp/consume` handler in the Python source — it only publishes
# `account.billing.cmd.capture` and `algo.configs.cmd.update`), so
# AMQP_CONSUMERS / AMQP_QUEUE_PREFIX / AMQP_FORWARD_URL are intentionally
# omitted: the gateway's spawn_consumers() no-ops when AMQP_CONSUMERS is unset.
# AMQP_URL / AMQP_EXCHANGE are still required for `/v1/amqp/publish`.
#
# This service does not use S3, so the AWS_* env vars are omitted too (the
# gateway's S3Buckets::from_env() degrades to a disabled client when unset).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octy-items-data-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octy-items-data-gateway
  template:
    metadata:
      labels:
        app: octy-items-data-gateway
    spec:
      containers:
        - name: gateway
          image: "<registry>/octy-data-gateway:0.1.0"
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DB_URI
              valueFrom:
                secretKeyRef:
                  name: items-secrets
                  key: DB_URI
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: items-secrets
                  key: AMQP_URL
            - name: AMQP_EXCHANGE
              value: "octy"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: octy-items-data-gateway
spec:
  selector:
    app: octy-items-data-gateway
  ports:
    - port: 8090
      targetPort: 8090
