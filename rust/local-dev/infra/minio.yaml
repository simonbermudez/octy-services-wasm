# MinIO — optional S3-compatible substitute for local dev (account bucket
# provisioning, messaging templates, ML worker dataset/model storage). Skip
# this entirely if you don't need those code paths yet; the gateway disables
# S3 gracefully (returns `ok: false` / `found: false`) when no AWS
# credentials are configured, it does not crash.
#
# To use it, point a service's gateway Deployment at:
#   AWS_ACCESS_KEY_ID=minioadmin
#   AWS_SECRET_ACCESS_KEY=minioadmin
#   AWS_REGION=us-east-1
#   AWS_ENDPOINT_URL=http://minio.octy-local:9000
#   S3_FORCE_PATH_STYLE=true   # MinIO needs path-style addressing, not virtual-hosted-style
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: octy-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: octy-local
spec:
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      name: api
    - port: 9001
      targetPort: 9001
      name: console
