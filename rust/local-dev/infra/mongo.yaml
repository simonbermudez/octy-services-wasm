# Single-node MongoDB for the local testbed. No auth, no persistence beyond
# the pod's lifetime (minikube-appropriate; add a PVC if you need data to
# survive pod restarts). The gateway's DB_URI should be:
#   mongodb://mongo.octy-local:27017/octy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: octy-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: octy-local
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
