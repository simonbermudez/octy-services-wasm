spin_manifest_version = 2

[application]
name = "octy-items"
version = "0.1.0"
description = "Octy items (Rust/WASM port of items/)"

[variables]
items_config = { required = true }
items_secrets = { required = true, secret = true }
octy_public_key = { default = "" }
gateway_url = { default = "http://127.0.0.1:8090" }

[[trigger.http]]
route = "/..."
component = "items"

[component.items]
source = "../../target/wasm32-wasip1/release/items_service.wasm"
files = [{ source = "keys", destination = "/keys" }]
allowed_outbound_hosts = [
    "http://*:*",
    "https://*:*",
    "redis://*:*",
    "rediss://*:*",
]

[component.items.variables]
items_config = "{{ items_config }}"
items_secrets = "{{ items_secrets }}"
octy_public_key = "{{ octy_public_key }}"
gateway_url = "{{ gateway_url }}"

[component.items.build]
command = "cargo build -p items-service --target wasm32-wasip1 --release"
workdir = "../.."
