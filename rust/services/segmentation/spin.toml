spin_manifest_version = 2

[application]
name = "octy-segmentation"
version = "0.1.0"
description = "Octy segmentation (Rust/WASM port of segmentation/)"

[variables]
segmentation_config = { required = true }
segmentation_secrets = { required = true, secret = true }
octy_public_key = { default = "" }
gateway_url = { default = "http://127.0.0.1:8090" }

[[trigger.http]]
route = "/..."
component = "segmentation"

[component.segmentation]
source = "../../target/wasm32-wasip1/release/segmentation_service.wasm"
files = [{ source = "keys", destination = "/keys" }]
allowed_outbound_hosts = [
    "http://*:*",
    "https://*:*",
    "redis://*:*",
    "rediss://*:*",
]

[component.segmentation.variables]
segmentation_config = "{{ segmentation_config }}"
segmentation_secrets = "{{ segmentation_secrets }}"
octy_public_key = "{{ octy_public_key }}"
gateway_url = "{{ gateway_url }}"

[component.segmentation.build]
command = "cargo build -p segmentation-service --target wasm32-wasip1 --release"
workdir = "../.."
