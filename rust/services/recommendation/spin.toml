spin_manifest_version = 2

[application]
name = "octy-recommendation"
version = "0.1.0"
description = "Octy recommendation (Rust/WASM port of recommendation/)"

[variables]
recommendation_config = { required = true }
recommendation_secrets = { required = true, secret = true }
octy_public_key = { default = "" }
gateway_url = { default = "http://127.0.0.1:8090" }

[[trigger.http]]
route = "/..."
component = "recommendation"

[component.recommendation]
source = "../../target/wasm32-wasip1/release/recommendation_service.wasm"
files = [{ source = "keys", destination = "/keys" }]
# Only the data gateway (MongoDB/AMQP bridge) is called outbound; this service
# uses no Redis, S3 or SageMaker. Tighten to the concrete gateway host per env.
allowed_outbound_hosts = [
    "http://*:*",
    "https://*:*",
]

[component.recommendation.variables]
recommendation_config = "{{ recommendation_config }}"
recommendation_secrets = "{{ recommendation_secrets }}"
octy_public_key = "{{ octy_public_key }}"
gateway_url = "{{ gateway_url }}"

[component.recommendation.build]
command = "cargo build -p recommendation-service --target wasm32-wasip1 --release"
workdir = "../.."
